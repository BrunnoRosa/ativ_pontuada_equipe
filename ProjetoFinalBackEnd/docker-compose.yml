version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: atv_mysql_container
    restart: always
    ports:
      - "3307:3306" # Mapeia a porta 3307 do seu PC para a 3306 do container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: atv_database
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: