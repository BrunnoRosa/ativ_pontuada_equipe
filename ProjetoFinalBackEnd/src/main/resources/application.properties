spring.application.name=ProjetoFinalBackEnd

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Se a variavel DB_HOST nao existir, o Spring usa 'localhost'
# Se a variavel DB_PORT nao existir, o Spring usa '3307'
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/atv_database
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_USERPASSWORD:root}