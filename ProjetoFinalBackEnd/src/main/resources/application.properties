spring.application.name=ProjetoFinalBackEnd

# Se a variável SPRING_PROFILES_ACTIVE não for definida no sistema, usa 'docker' como padrão, mas caso necessite, mude para 'local'.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:docker}

# Configurações comuns a todos os ambientes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver