spring.application.name=ProjetoFinalBackEnd

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Se a variável DB_HOST năo existir, o Spring usa 'localhost'
# Se a variável DB_PORT năo existir, o Spring usa '3307'
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/atv_database
spring.datasource.username=root
spring.datasource.password=root